<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO Primary -->
    <title>Numar Store — Moda Feminina Sofisticada</title>
    <meta name="description" content="Numar Store — Vestidos, conjuntos e peças exclusivas. Frete grátis acima de R$300. Pix, cartão em até 3x sem juros. Compre pelo WhatsApp." />
    <meta name="keywords" content="moda feminina, vestidos, conjuntos, biquínis, loja online, Numar Store" />
    <meta name="author" content="Numar Store" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://numarstore.com.br/" />

    <!-- Security Headers via meta -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()" />

    <!-- Theme -->
    <meta name="theme-color" content="#C9973A" />
    <meta name="color-scheme" content="light" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://numarstore.com.br/" />
    <meta property="og:title" content="Numar Store — Moda Feminina Sofisticada" />
    <meta property="og:description" content="Vestidos, conjuntos e peças exclusivas. Frete grátis acima de R$300. Pix com 5% de desconto." />
    <meta property="og:image" content="/apple-touch-icon.png" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="Numar Store" />

    <!-- Twitter/X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Numar Store — Moda Feminina Sofisticada" />
    <meta name="twitter:description" content="Vestidos, conjuntos e peças exclusivas. Frete grátis acima de R$300." />
    <meta name="twitter:image" content="/apple-touch-icon.png" />

    <!-- Performance: preconnect fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Structured Data (SEO) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ClothingStore",
      "name": "Numar Store",
      "description": "Loja virtual de moda feminina — vestidos, conjuntos e peças exclusivas.",
      "url": "https://numarstore.com.br",
      "logo": "https://numarstore.com.br/apple-touch-icon.png",
      "sameAs": ["https://www.instagram.com/use.numar"],
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+55-21-97967-4510",
        "contactType": "customer service",
        "availableLanguage": "Portuguese"
      },
      "priceRange": "R$45 - R$120"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
